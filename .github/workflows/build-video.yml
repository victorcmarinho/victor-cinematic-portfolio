name: Build Cinematic Video

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Remotion Install
        run: npx remotion browser install

      - name: Build WebM Video (60FPS HD)
        run: |
          mkdir -p docs
          npx remotion render src/index.ts CinematicPortfolio docs/showcase.webm --codec=webm --fps=60 --width=1920 --height=1080

      - name: Commit and Push generated video
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/showcase.webm
          git commit -m "docs: auto-generate HD cinematic video [skip ci]" || echo "No changes to commit"
          git push
